apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticket-api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: ticket-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticket-api
                port:
                  number: 8080
